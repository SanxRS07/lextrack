<!DOCTYPE html>
<html>
<head>
    <title>Add Case</title>
</head>
<body>

    <h2>Add Case</h2>

    <form method="POST">
        <input type="text" name="case_number" placeholder="Case Number" required><br><br>
        <input type="text" name="court_name" placeholder="Court Name" required><br><br>
        <input type="text" name="status" placeholder="Status" required><br><br>
        <input type="date" name="next_hearing" required><br><br>

        <button type="submit">Add Case</button>
    </form>

</body>
</html>
